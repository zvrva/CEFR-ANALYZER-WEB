<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Анализ текстов из CSV</title>
  <style>
    body {
      margin: 0;
      font-family: Inter, system-ui, sans-serif;
      background: #eef6ff;
      color: #1f2937;
    }
    .container {
      max-width: 620px;
      margin: 48px auto;
      padding: 24px;
      background: #ffffff;
      border: 1px solid #d1d5db;
      border-radius: 16px;
    }
    h1 {
      margin-top: 0;
      color: #0f172a;
    }
    .hint {
      margin-top: 12px;
      padding: 14px 16px;
      border-radius: 12px;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      color: #1e3a8a;
      line-height: 1.5;
    }
    label {
      display: block;
      margin-top: 18px;
      font-weight: 600;
    }
    input[type=file] {
      width: 100%;
      margin-top: 12px;
    }
    button {
      margin-top: 24px;
      padding: 14px 18px;
      border: none;
      border-radius: 12px;
      background: #60a5fa;
      color: #ffffff;
      font-size: 1rem;
      cursor: pointer;
    }
    button:hover {
      background: #3b82f6;
    }
    button:disabled {
      background: #93c5fd;
      cursor: wait;
    }
    .message {
      margin-top: 18px;
      padding: 16px;
      border-radius: 12px;
      background: #f1f5f9;
      border: 1px solid #e2e8f0;
      color: #0f172a;
      white-space: pre-wrap;
    }
    .message.error {
      background: #fef2f2;
      border-color: #fecaca;
      color: #991b1b;
    }
    .nav {
      margin-bottom: 24px;
    }
    .nav a {
      color: #2563eb;
      text-decoration: none;
    }
    .progress-card {
      display: none;
      margin-top: 18px;
      padding: 18px;
      border-radius: 14px;
      background: #f8fafc;
      border: 1px solid #dbeafe;
    }
    progress {
      width: 100%;
      height: 18px;
      margin-top: 10px;
    }
    .progress-title {
      margin: 0;
      font-size: 1rem;
      font-weight: 600;
      color: #0f172a;
    }
    .progress-text {
      margin-top: 10px;
      color: #475569;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="nav"><a href="/">← Главная</a></div>
    <h1>Анализ текстов из CSV</h1>
    <div class="hint">
      CSV-файл должен содержать ровно один столбец с текстами и быть без заголовка.
    </div>
    <form id="uploadForm">
      <label for="file">Файл CSV</label>
      <input id="file" name="file" type="file" accept=".csv" required />
      <button id="submitButton" type="submit">Начать анализ</button>
    </form>

    <div id="progressCard" class="progress-card">
      <p class="progress-title">Анализ текста</p>
      <progress id="analysisProgress" value="0" max="100"></progress>
      <div id="progressText" class="progress-text"></div>
    </div>

    <div id="message" class="message" style="display:none"></div>
  </main>

  <script>
    const baseUrl = window.location.origin;
    const form = document.getElementById('uploadForm');
    const message = document.getElementById('message');
    const progressCard = document.getElementById('progressCard');
    const progressBar = document.getElementById('analysisProgress');
    const progressText = document.getElementById('progressText');
    const submitButton = document.getElementById('submitButton');

    let pollTimer = null;

    const statusLabels = {
      queued: 'в очереди',
      running: 'выполняется',
      completed: 'завершено',
      failed: 'ошибка'
    };

    const setMessage = (text, isError = false) => {
      message.style.display = 'block';
      message.classList.toggle('error', isError);
      message.textContent = text;
    };

    const clearMessage = () => {
      message.style.display = 'none';
      message.classList.remove('error');
      message.textContent = '';
    };

    const setProgress = (processed, total, status) => {
      progressCard.style.display = 'block';
      const statusLabel = statusLabels[status] || status;

      if (total > 0) {
        progressBar.value = Math.round((processed / total) * 100);
        progressText.textContent = `Статус: ${statusLabel}. Обработано ${processed} из ${total} текстов.`;
      } else {
        progressBar.value = 0;
        progressText.textContent = `Статус: ${statusLabel}. Подготавливаем анализ.`;
      }
    };

    const stopPolling = () => {
      if (pollTimer) {
        clearInterval(pollTimer);
        pollTimer = null;
      }
    };

    const downloadResult = async (jobId, token) => {
      const response = await fetch(`${baseUrl}/upload/result/${jobId}`, {
        headers: {
          'Authorization': `Bearer ${token}`
        }
      });

      if (!response.ok) {
        const errorText = await response.text();
        throw new Error(errorText || `HTTP ${response.status}`);
      }

      const blob = await response.blob();
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = 'results.csv';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
    };

    const startPolling = (jobId, token) => {
      stopPolling();

      pollTimer = setInterval(async () => {
        try {
          const response = await fetch(`${baseUrl}/upload/status/${jobId}`, {
            headers: {
              'Authorization': `Bearer ${token}`
            }
          });

          const statusData = await response.json();
          if (!response.ok) {
            throw new Error(statusData.detail || `HTTP ${response.status}`);
          }

          setProgress(statusData.processed, statusData.total, statusData.status);

          if (statusData.status === 'completed') {
            stopPolling();
            progressBar.value = 100;
            progressText.textContent = `Статус: завершено. Обработано ${statusData.total} из ${statusData.total} текстов.`;
            await downloadResult(jobId, token);
            submitButton.disabled = false;
            setMessage('Файл results.csv готов и скачан.');
          } else if (statusData.status === 'failed') {
            stopPolling();
            submitButton.disabled = false;
            setMessage(`Ошибка анализа: ${statusData.error || 'неизвестная ошибка'}`, true);
          }
        } catch (error) {
          stopPolling();
          submitButton.disabled = false;
          setMessage(`Ошибка проверки статуса: ${error.message}`, true);
        }
      }, 1000);
    };

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      clearMessage();
      stopPolling();
      progressCard.style.display = 'none';
      progressBar.value = 0;
      progressText.textContent = '';

      const token = localStorage.getItem('accessToken');
      if (!token) {
        setMessage('Сначала выполните вход на странице входа.', true);
        return;
      }

      const fileInput = document.getElementById('file');
      if (!fileInput.files.length) {
        setMessage('Выберите файл CSV.', true);
        return;
      }

      submitButton.disabled = true;
      setProgress(0, 0, 'queued');

      const formData = new FormData();
      formData.append('file', fileInput.files[0]);

      try {
        const response = await fetch(`${baseUrl}/upload`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${token}`
          },
          body: formData
        });

        const data = await response.json();
        if (!response.ok) {
          submitButton.disabled = false;
          throw new Error(data.detail || `HTTP ${response.status}`);
        }

        startPolling(data.job_id, token);
      } catch (error) {
        submitButton.disabled = false;
        setMessage(`Ошибка: ${error.message}`, true);
      }
    });
  </script>
</body>
</html>
