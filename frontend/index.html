<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CEFR Analyzer Frontend</title>
  <style>
    body {
      margin: 0;
      font-family: Inter, system-ui, sans-serif;
      background: #eef6ff;
      color: #1f2937;
    }
    .page {
      max-width: 720px;
      margin: 48px auto;
      padding: 24px;
      background: #ffffff;
      border: 1px solid #d1d5db;
      border-radius: 16px;
    }
    h1 {
      margin-top: 0;
      color: #0f172a;
    }
    .links {
      display: grid;
      gap: 12px;
      margin-top: 24px;
    }
    .card {
      display: block;
      padding: 18px 20px;
      border-radius: 12px;
      text-decoration: none;
      color: #0f172a;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
    }
    .card:hover {
      background: #e2e8f0;
    }
    p {
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <main class="page">
    <h1>CEFR Analyzer</h1>
    <p>Простая фронтенд-оболочка для каждого доступного эндпоинта.</p>
    <div class="links">
      <a class="card" href="/register">Регистрация</a>
      <a class="card" href="/login">Вход</a>
      <a class="card" href="/analyze">Анализ текста</a>
      <a class="card" href="/upload">Загрузка CSV</a>
      <a class="card" href="/history">История анализа</a>
    </div>
  </main>
</body>
</html>
